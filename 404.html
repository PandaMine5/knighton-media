<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Knighton Media 404</title>
  <link rel="preload" href="css/fonts.css" as="style" />
  <link rel="stylesheet" href="css/fonts.css" />  
  <link rel="stylesheet" href="css/reset.css" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <style>
    .error__container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100vh;     
      padding: 3rem;
    }

    .error__status {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.125rem;
    }

    .error__text {
      font-size: 0.75rem;
      font-weight: 500;
      color: hsl(0 0% 60%);
      line-height: 1.3;
      margin-bottom: 0.5rem;
      max-width: 400px;
    }

    .homepage-button {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--dark-ultra);
      background: white;    
      border-radius: 14px;
      padding: 8px 16px;
    }
    
    @media (min-width: 620px) {
    	.error__status {
    	font-size: 5rem;
    margin: 0;
    	}
    
       .error__text {
       	font-size: 1.25rem;
       margin-bottom: 0.75rem;
       }
       
       .homepage-button {
       	font-size: 1rem;
       }
    }
  </style>
</head>
<body>
  <div class="error__container">
    <div class="error__status">404</div>
    <div class="error__text">This page doesn't exist, click button below to return.</div>
    <a class="homepage-button" href="index.html">Homepage</a>
  </div>  
</body>
</html>
