      <style>
            .player {
            	display: none;
                position: relative;
                width: 100%;
                height: 200px;
            }
            
            #video {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
           
            .player__overlay {
                position: absolute;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                inset: 0;                
                opacity: 1;
                
                &.hidden {
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease-in-out;
            }
            }

            .player__back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: 8px;
    left: 14px;
    border-radius: 50%;
    background: hsl(0 0% 100% / 0.1);
    backdrop-filter: blur(2px);
    box-shadow:
          1px 1px hsl(0 0% 100% / 0.2) inset,
          -1px -1px hsl(0 0% 100% / 0.15) inset;
    padding: 6px;
                opacity: 1;    
    z-index: 3;
    cursor: pointer;
    pointer-events: auto !important;
                
                &.hidden {
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease-in-out;
            }
}

            .player__header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px;
                padding-top: 8px;
                z-index: 2;
            }

            .player__meta {
                text-align: center;
                flex: 1;
            }
            .player__meta-title {
                font-size: 12px;
                font-weight: 500;
                text-shadow: 0px 1px 5px black;
            }
            .player__meta-episode {
                font-size: 10px;
                font-weight: 500;
                opacity: 0.7;
                margin-top: 2px;
                text-shadow: 0px 1px 5px black;
            }
            .player__controls--center {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .player__button {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 56px;
                height: 56px;
                cursor: pointer;
            }
            .player__icon--play {
                width: 24px;
                height: 24px;
                color: #fff;           
            }
            .player__button--skip {
                position: absolute;
                width: 38%;
                height: 100%;
                background: hsl(0 0% 100% / 0);
                
                &.left {
                    left: 0%;
                }
                &.right {
                    right: 0%;
                }
            }
            .player__controls--bottom {
                display: flex;
                flex-direction: column;
                gap: 6px;
                padding: 0 14px;
                padding-bottom: 8px;
                z-index: 2;
            }
            .player__time-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.125rem;
            }
            .player__time {
                font-size: 10px;
                font-weight: 500;
                color: white;
                text-shadow: 0px 1px 3px black;
            }
            .player__time--end {
                opacity: 0.7;
            }
            .player__seekbar {
                position: relative;
                width: 100%;
                margin-bottom: 0.25rem;
            }
            .player__seekbar-track,
            .player__seekbar-fill,
            .player__seekbar-buffered {
                position: absolute;
                inset: 0;
                border-radius: 1000px;
                height: 3px;
            }
            .player__seekbar-track {
                background: hsl(0 0% 100% / 0.2);
                backdrop-filter: blur(2px);
            }
            .player__seekbar-fill {
                background: white;
                width: 0%;
            }
            .player__seekbar-buffered {
                background: hsl(0 0% 100% / 0.27);
                width: 0%;
            }

            .player__seekbar input[type="range"] {
                -webkit-appearance: none;
                position: absolute;
                width: 100%;
                height: 100%;
                background: transparent;
                margin: 0;
                z-index: 2;
            }
            .player__seekbar input[type="range"]::-webkit-slider-thumb,
            -moz-range-thumb {
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: white;
                transform: translateY(1px);
                filter: drop-shadow(0 2px 2px hsl(0 0% 10% / 0.5));
            }

            .player__toolbar {
                display: flex;
                justify-content: space-between;
            }
            .player__toolbar-group {
                display: flex;
                align-items: center;
                gap: 1rem;
                border-radius: 1000px;
                background: hsl(0 0% 100% / 0.1);
                backdrop-filter: blur(2px);
                box-shadow:
          1px 1px hsl(0 0% 100% / 0.2) inset,
          -1px -1px hsl(0 0% 100% / 0.15) inset;
                padding: 6px 8px;
            }

            .player__menu {
                display: none;
                flex-direction: column;
                width: 120px;
                max-height: 100px;
                position: absolute;
                bottom: 56px;
                right: 14px;
                background: hsl(0 0% 10%);
                border: 1px solid hsl(0 0% 100% / 0.1);
                border-radius: 8px;
                overflow-y: auto;
                box-shadow: 2px 2px 7px rgba(0, 0, 0, 0.2);
                z-index: 3;
                
                &.visible {
                  display: flex;
                }
            }

            .player__menu-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                color: white;
                font-size: 11px;
                padding: 8px 14px;
                
                &:hover {
                   background: hsl(0 0% 17%);
                }
            }

            .player__menu-item + .player__menu-item {
                border-top: 1px solid hsl(0 0% 100% / 0.06);
            }

            .player__menu-label {
                font-size: 11px;
            }

            .player__menu--sub button {
                font-size: 11px;
                text-align: left;
                color: hsl(0 0% 75%);
                padding: 8px 14px;
            }
            .player__menu--sub button:hover {
                background: hsl(0 0% 17%);
            }
            .player__menu--sub button.active {
                color: hsl(0 0% 100%);
                background: hsl(0 0% 10%);
            }
            .player__menu--back-btn {
                display: flex;
                align-items: center;
                gap: 0.125rem;
                cursor: pointer;
            }        
      </style>

      <script type="module">  
import { ep } from "./js/episode.js";
const ratingOn = false;

const getID = document.getElementById.bind(document);
const getSelector = document.querySelector.bind(document);

const video = getID("video");
const player = getID("player");
const backButton = getID("backButton");
const watchButton = getID("watchButton");
const playButton = [getID("playButton"), getID("playButtonToolbar")];
const playIcon = [getID("iconPlayPause"), getID("iconPlayPauseToolbar")];
const rewindButton = getID("rewindButton");
const mainImageWrapper = getID("mainImageWrapper");

const
   forwardButton = getID("forwardButton");
const volumeButton = getID("volumeButtonToolbar");
const fullscreenButton = getID("fullscreenButtonToolbar");
const settingsButton =
   getID("settingsButtonToolbar");
const settingsMenu = getID("settingsMenu");
const mediaButton =
   getID("mediaButtonToolbar");
const seekbarSlider = getID("seekbar-slider");
const seekFill = getID("seekFill");
const
   seekBuffered = getID("seekBuffered");
const currentTime = getID("currentTime");
const remainingTime =
   getID("remainingTime");
const overlay = document.querySelector(".player__overlay");


video.poster = `assets/episode-images/${ratingOn ? 'no-spoilers' : ''}/${ep.thumbnail}`;


//const proxy = "https://proxy.corsfix.com/";

if (ep.m3u8_link && Hls.isSupported()) {
   const hls = new Hls({
      enableWorker: true,
      maxBufferLength: 35,
      maxBufferSize: 30 * 1000 * 1000,
      fragLoadingTimeOut: 35000,
      fragLoadingMaxRetry: 3,
   });

   hls.loadSource(ep.m3u8_link);
   hls.attachMedia(video);

   hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(() => {});
   });

   hls.on(Hls.Events.MANIFEST_PARSED, () => {
      const levels = hls.levels.map((lvl, i) => ({
         index: i,
         height: lvl.height,
         label: `${lvl.height}p`,
      }));
      window.qualityLevels = levels;
   });
   
   window.hls = hls;
}

else if (ep.m3u8_link && video.canPlayType("application/vnd.apple.mpegurl")) {
   video.src = proxy + ep.m3u8_link;
   video.play().catch(() => {});
}

else if (ep.h264_link) {
   video.src = ep.h264_link;
}


backButton.addEventListener("click", () => {
	history.back();
});

watchButton.addEventListener("click", () => {
	player.style.display = "block";
	mainImageWrapper.style.display = "none";
	showOverlay();
});

fullscreenButton.addEventListener("click", (e) => {
    e.stopPropagation();
    toggleFullscreen();
});

document.addEventListener("fullscreenchange", () => {
    fullscreenButton.querySelector("use").setAttribute("href", document.fullscreenElement ? "#icon-minimize" : "#icon-maximize");
});

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        player.requestFullscreen().catch(console.error);
    } else {
        document.exitFullscreen();
    }
}


function formatTime(time) {
   let minutes = String(Math.floor(time / 60));
   let seconds = String(Math.floor(time % 60));
   return `${minutes}:${seconds.padStart(2, "0")}`;
}

function updateTimeline() {
   if (video.duration) {
      const progress = (video.currentTime / video.duration) * seekbarSlider.max;
      seekbarSlider.value = progress;
      seekFill.style.width = `${progress / 10}%`;
      currentTime.textContent =
         formatTime(video.currentTime);
      if (video.buffered.length > 0) {
         const bufferedEnd =
            video.buffered.end(video.buffered.length - 1);
         const bufferedPercent = (bufferedEnd / video.duration) * 100;
         seekBuffered.style.width = `${bufferedPercent}%`;
      }
   }
}

function togglePlay() {
   video.paused ?
      video.play().catch(console.error) : video.pause();
}
video.addEventListener("loadedmetadata", () => {
   remainingTime.textContent = formatTime(video.duration);
});
seekbarSlider.addEventListener("input", () => {
   if (video.duration) {
      video.currentTime = (seekbarSlider.value / seekbarSlider.max) * video.duration;
      updateTimeline();
   }
});
playButton.forEach((b) => b.addEventListener("click", togglePlay));
video.addEventListener("play", () =>
   playIcon.forEach((i) => i.setAttribute("href", "#icon-pause")));
video.addEventListener("pause", () =>
   playIcon.forEach((i) => i.setAttribute("href", "#icon-play")));
video.addEventListener("timeupdate", updateTimeline);
video.addEventListener("click", togglePlay);
let skipMode = false;

let skipTimeout; 
// -5s
rewindButton.addEventListener("click", () => {
   if (!skipMode) return;
   video.currentTime = Math.max(0, video.currentTime -
      5);
   updateTimeline();
   clearTimeout(skipTimeout);
   skipTimeout = setTimeout(() => {
      skipMode = false;
   }, 500);
});
rewindButton.addEventListener("dblclick", () => {
   skipMode = true;
   video.currentTime = Math.max(0, video.currentTime -
      5);
   updateTimeline();
   clearTimeout(skipTimeout);
   skipTimeout = setTimeout(() => {
      skipMode = false;
   }, 500);
});
// +5s
forwardButton.addEventListener("click", () => {
   if (!skipMode) return;
   video.currentTime = Math.min(video.duration,
      video.currentTime + 5);
   updateTimeline();
   clearTimeout(skipTimeout);
   skipTimeout = setTimeout(() => {
      skipMode = false;
   }, 500);
});
forwardButton.addEventListener("dblclick", () => {
   skipMode = true;
   video.currentTime =
      Math.min(video.duration, video.currentTime + 5);
   updateTimeline();
   clearTimeout(skipTimeout);
   skipTimeout =
      setTimeout(() => {
         skipMode = false;
      }, 500);
});
volumeButton.addEventListener("click", () => {
   video.muted = !video.muted;
   volumeButton.querySelector("use").setAttribute("href", video.muted ? "#icon-volume-off" :
      "#icon-volume-max");
});

function createMenu({
   title,
   items,
   isSub = false,
   onBack
}) {
   settingsMenu.innerHTML = "";
   settingsMenu.classList.toggle("player__menu--sub", isSub);
   settingsMenu.classList.add("visible");
   if (isSub) {   
const back = document.createElement("button");
back.className = "player__menu--back-btn";
back.innerHTML = `<svg class="svg-icon"><use href="#icon-chevron-left"></use></svg>Back`;   
      back.addEventListener("click", (e) => {
         e.stopPropagation();
         onBack();
      });
      settingsMenu.appendChild(back);
   }
   items.forEach((item) => {
      if (item.type === "submenu") {
         const div = document.createElement("div");
         div.className =
            "player__menu-item";
         div.innerHTML = `
<div class="player__menu-label">${item.label}</div>
<svg class="svg-icon" style="opacity: 0.6"><use href="#icon-chevron-right"></use></svg>`;
         div.addEventListener("click", (e) => {
            e.stopPropagation();
            item.open();
         });
         settingsMenu.appendChild(div);
      } else {
         const btn =
            document.createElement("button");
         btn.textContent = item.label;
         if (item.active) btn.classList.add("active");
         btn.addEventListener("click", (e) => {
            e.stopPropagation();
            item.action();
            if (!item.stayOpen) {
               return onBack();
            }
         });
         settingsMenu.appendChild(btn);
      }
   });
}

function showSettingsMenu() {
   createMenu({
      isSub: false,
      items: [{
         type: "submenu",
         label: "Quality",
         open: () => openSubMenu("quality")
      }, {
         type: "submenu",
         label: "Speed",
         open: () =>
            openSubMenu("speed"),
      }/*, {
         type: "submenu",
         label: "Effects",
         open: () => openSubMenu("effects")
      }, */],
   });
}

function
showMediaMenu() {
   createMenu({
      isSub: false,
      items: [{
         type: "submenu",
         label: "Languages",
         open: () =>
            openMediaSubMenu("language")
      }/*, {
         type: "submenu",
         label: "Subtitles",
         open: () => openMediaSubMenu("subtitles"),
      }, */],
   });
}

   const levels = hls.levels.map((lvl, i) => ({
      index: i,
      height: lvl.height,
      label: `${lvl.height}p`,
   }));
   window.qualityLevels = levels;

function openSubMenu(type) {
   if (type ===
      "quality") {
      const items = (window.qualityLevels || []).map((lvl) => ({
         label: lvl.label,
         active: hls.currentLevel ===
            lvl.index,
         action: () => {
            hls.currentLevel = lvl.index;
         },
      }));
      createMenu({
         isSub: true,
         onBack: showSettingsMenu,
         items,
      });
      return;
   }
   const data = {
      quality: [],
      speed: [0.25, 0.5, 1, 1.5, 2, 4, 8, 16],
      effects: ["Sharp Image",
         "Color Grading"
      ],
   } [type];
   
   const items = data.map((value) => {
      const label = type === "speed" ? `${value}x` : value;
      const isActive = (type === "speed" && video.playbackRate === value) || (type === "effects" && value === "Sharp Image");
      return {
         label,
         active: isActive,
         action: () => {
            if (type === "speed") video.playbackRate = value;
         },
      };
   });
   createMenu({
      isSub: true,
      onBack: showSettingsMenu,
      items,
   });
}

function openMediaSubMenu(type) {
   let items = [];
   if (type === "language" && hls.audioTracks) {
      items = hls.audioTracks.map((track, index) => ({
         label: track.name,
         active: index === hls.audioTrack,
         action: () => {
            hls.audioTrack = index;
         },
      }));
   }
   if (type === "subtitles") {
      items =
         hls.audioTracks.map((track, index) => ({
            label: track.name,
            active: index === hls.audioTrack,
            action: () => {
               hls.audioTrack = index;
            },
         }));
   }
   createMenu({
      isSub: true,
      onBack: showMediaMenu,
      items,
   });
}
settingsButton.addEventListener("click", (e) => {
   e.stopPropagation();
   settingsMenu.classList.contains("visible") ?
      settingsMenu.classList.remove("visible") : showSettingsMenu();
});
mediaButton.addEventListener("click", (e) => {
   e.stopPropagation();
   settingsMenu.classList.contains("visible") ? settingsMenu.classList.remove("visible") :
      showMediaMenu();
});
document.addEventListener("click", (e) => {
   if (settingsMenu.classList.contains("visible") &&
      !settingsMenu.contains(e.target) && e.target !== settingsButton && e.target !== mediaButton) {
      settingsMenu.classList.remove("visible");
   }
});


let hideControlsTimeout;

function showOverlay() {
   overlay.classList.remove("hidden");
   backButton.classList.remove("hidden");
   clearTimeout(hideControlsTimeout);
   if (!video.paused) {
      hideControlsTimeout = setTimeout(() => {
            overlay.classList.add("hidden");
            backButton.classList.add("hidden");
         }, 3000);
   }
}

["mousemove", "click", "touchstart"].forEach((event) => {
   player.addEventListener(event, showOverlay);
});

player.addEventListener("mouseleave", () => {
   if (!video.paused || video.paused) {
      overlay.classList.add("hidden");
      backButton.classList.add("hidden");
   }
});

document.addEventListener("click", (e) => {
    const clickOutside = !player.contains(e.target);

    if (!video.paused && clickOutside) {
        overlay.classList.add("hidden");
    }
});

video.addEventListener("play", showOverlay);
video.addEventListener("pause", showOverlay);
