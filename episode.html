        <style>
            :root {
                --player-margin-inline: 18px;
                --player-margin-block: 10px;
            }

            .player {
                display: none;
                position: relative;
                width: 100%;
            }

            /* Remove HTML subtitles */
            video::cue {
                opacity: 0 !important;
                visibility: hidden !important;
            }

            video::-webkit-media-text-track-display {
                display: none !important;
            }

            video::-webkit-media-text-track-container {
                display: none !important;
            }

            #video {
                position: relative;
                display: block;
                width: 100%;
                aspect-ratio: 16 / 9.5;
                object-fit: cover;
                background: black;

                &.default {
                    filter: saturate(1);
                }

                &.desaturated {
                    filter: contrast(0.86) saturate(0.96) brightness(1.04);
                }

                &.vibrant {
                    filter: saturate(1.087) contrast(1.07) hue-rotate(-7.7deg) sepia(0.063) opacity(0.978);
                }

                &.filmic {
                    filter: brightness(0.974) saturate(1.197) contrast(1.294) hue-rotate(-12deg) sepia(0.343) opacity(0.94);
                }

                &.hdr {
                    filter: brightness(0.82) saturate(1.237) contrast(1.483) hue-rotate(-10deg) sepia(0.17);
                }
            }

            .player:fullscreen #video,
            .player:-webkit-full-screen #video {
                width: 100vw !important;
                height: 100vh !important;
                object-fit: contain !important;
            }

            .player__overlay {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                background: hsl(0 0% 0% / 0.2);
            }

            .player__overlay,
            .player__back-btn {
                opacity: 1;
                transition:
                    opacity 200ms ease-in-out,
                    backdrop-filter 200ms ease-in-out;

                &.hidden {
                    opacity: 0;
                    pointer-events: none;
                }
            }

            .player__back-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 8px;
                left: 14px;
                filter: drop-shadow(0 0 3px hsl(0 0% 0% / 0.75));
                padding: 6px;
                z-index: 5;
                pointer-events: auto !important;
            }

            .player__controls--top {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-top: var(--player-margin-block);
                margin-inline: var(--player-margin-inline);
                z-index: 2;
            }

            .player__meta {
                text-align: center;
                flex: 1;
            }

            .player__meta-title,
            .player__meta-episode {
                font-weight: 500;
                text-shadow: 0 0 3px hsl(0 0% 0% / 0.65);
            }

            .player__meta-title {
                font-size: clamp(0.75rem, 3vw, 0.875rem);
                margin-bottom: 0.125rem;
            }

            .player__meta-episode {
                font-size: clamp(0.625rem, 3vw, 0.75rem);
                opacity: 0.75;
            }

            .player__controls--center {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .player__button {
                display: flex;
                align-items: center;
                justify-content: center;
                width: clamp(44px, 5vw, 90px);
                aspect-ratio: 1;
                z-index: 2;
            }

            .player__icon--play {
                width: clamp(20px, 2.75vw, 34px);
                aspect-ratio: 1;
                filter: drop-shadow(0 0 2px hsl(0 0% 0% / 0.35));
            }

            .player__button--skip {
                position: absolute;
                width: 34%;
                height: 100%;

                &.left {
                    left: 0%;
                }
                &.right {
                    right: 0%;
                }
            }

            .player__controls--bottom {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-inline: var(--player-margin-inline);
                margin-bottom: var(--player-margin-block);
                z-index: 3;
            }

            .player__time-wrapper {
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            .player__time {
                font-size: clamp(10px, 2vw, 11px);
                font-weight: 600;
                color: white;
                text-shadow: 0px 1px 1px hsl(0 0% 0% / 0.5);

                &.end {
                    opacity: 0.75;
                }
            }

            .player__seekbar {
                position: relative;
                display: flex;
                align-items: center;
                width: 100%;
                height: 100%;
                cursor: pointer;
            }

            .player__seekbar-track,
            .player__seekbar-fill,
            .player__seekbar-buffered {
                position: absolute;
                left: 0;
                top: 50%;
                height: 3px;
                width: 100%;
                border-radius: 100vmax;
                transform: translateY(-50%);
            }

            .player__seekbar-track {
                background: hsl(0 0% 85% / 0.45);
            }

            .player__seekbar-fill {
                background: white;
                width: 0%;
            }

            .player__seekbar-buffered {
                background: hsl(0 0% 100% / 0.3);
                width: 0%;
            }

            .player__seekbar input[type="range"] {
                all: unset;
                position: absolute;
                inset: 0;
                background: transparent;
                margin: 0;
                z-index: 2;
            }

            .player__seekbar input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                border: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: white;
                filter: drop-shadow(-1px 0px 1px hsl(0 0% 0% / 0.15));
            }

            .player__seekbar input[type="range"]::-moz-range-thumb {
                appearance: none;
                border: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: white;
                filter: drop-shadow(-1px 0px 1px hsl(0 0% 0% / 0.15));
            }

            .player__toolbar {
                display: flex;
                justify-content: space-between;
            }

            .player__toolbar-group {
                display: flex;
                align-items: center;
                gap: clamp(0.875rem, 5vw, 1.125rem);
                border-radius: 100vmax;
                background: hsl(0 0% 100% / 0.13);
                box-shadow:
                    1px 1px hsl(0 0% 100% / 0.35) inset,
                    -1px -1px hsl(0 0% 100% / 0.25) inset,
                    0 0 2px hsl(0 0% 0% / 0.13);
                backdrop-filter: saturate(1.1) contrast(1.12) blur(1px);
                padding: 6px 8px;
            }

            .player__menu {
                display: none;
                flex-direction: column;
                min-width: 100px;
                max-height: 100px;
                position: absolute;
                bottom: calc(var(--player-margin-block) + 2.25rem);
                right: var(--player-margin-inline);
                color: hsl(0 0% 92%);
                border: 1px solid hsl(0 0% 100% / 0.08);
                outline: 0.875px solid hsl(0 0% 6%);
                border-radius: 8px;
                background: hsl(0 0% 8% / 0.82);
                backdrop-filter: blur(5px);
                box-shadow: 0 8px 10px hsl(0 0% 0% / 0.5);
                overflow-y: auto;
                z-index: 3;

                &.visible {
                    display: flex;
                }
            }

            .player__menu-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 0.625rem;

                &:hover {
                    background: hsl(0 0% 16% / 0.75);
                }
            }

            .player__menu-item + .player__menu-item {
                position: relative;
            
                &::before {
                    content: "";
                    position: absolute;
                    top: 0;
                    left: 0.75rem;
                    right: 0.75rem;
                    height: 1px;
                    background: hsl(0 0% 100% / 0.06);
                }
            }

            .player__menu-item,
            .player__menu-label,
            .player__menu--sub > button {
                font-size: 11px;
                text-align: left;
            }

            .player__menu-item,
            .player__menu--sub > button {
                padding: 8px 18px;
            }

            .player__menu--sub > button {
                color: hsl(0 0% 72%);

                &:hover {
                    background: hsl(0 0% 16% / 0.75);
                }

                &.active {
                    color: hsl(0 0% 92%);
                }
            }

            .player__menu--back-btn {
                display: flex;
                align-items: center;
                gap: 0.25rem;
                cursor: pointer;
            }

            .player__menu-item .svg-icon,
            .player__menu--back-btn .svg-icon {
                flex-shrink: 0;
            }

            .player__watermark {
                display: block;
                position: absolute;
                bottom: 4%;
                right: 4%;
                width: clamp(24px, 5vw, 80px);
                aspect-ratio: 1;
                border-radius: clamp(7px, 1.5vw, 18px);
                opacity: 0.35;
                pointer-events: none;
                z-index: 6;
            }

            #player.overlay_visible .player__watermark {
                opacity: 0;
            }

            #subtitles {
                position: absolute;
                left: 50%;
                bottom: var(--subtitles-bottom, 5%);
                transform: translateX(-50%);
                font-size: clamp(10px, 2vw, 21px);
                font-weight: 600;
                width: fit-content;
                max-width: 75%;
                white-space: normal;
                overflow-wrap: break-word;
                text-align: center;
                color: hsl(0 0% 94%);
                background: hsl(0 0% 0% / 0.5);
                opacity: 0;
                padding: 2px 4px;
                pointer-events: none;

                &.visible {
                    opacity: 1;
                }
            }

            #player.overlay_visible #subtitles {
                --subtitles-bottom: calc(var(--player-margin-block) * 2 + 2.5rem);
            }

            @media (min-width: 540px) {
                .player__toolbar-group {
                    font-size: 1.125rem;
                    gap: 1.125rem;
                    background: transparent !important;
                    box-shadow: none !important;
                    backdrop-filter: none !important;
                    padding: 8px 0 !important;
                }
            }

            @media (min-width: 720px) {
                .main-episode__description {
                    font-size: 1rem;
                }

                .main-episode__meta {
                    font-size: 0.875rem;
                }

                .main-episode__metatag {
                    font-size: 0.875rem;
                    border-radius: 4px;
                    padding: 0 4px;
                }

                .rating__value {
                    font-size: 1.5rem;
                }

                .rating__max {
                    font-size: 0.75rem;
                }

                .info__title {
                    font-size: 0.875rem;
                }

                .info__description {
                    font-size: 0.875rem;
                    margin-bottom: 1.5rem;
                }
            }

            @media (orientation: landscape) {
                :root {
                    --player-margin-inline: 36px;
                    --player-margin-block: 16px;
                }

                .player__overlay {
                    background: transparent;
                }

                .player__overlay::before {
                    content: "";
                    position: absolute;
                    inset: 0;
                    pointer-events: none;
                    background: linear-gradient(to bottom, hsl(0 0% 0% / 0.6) 0%, transparent 40%), linear-gradient(to top, hsl(0 0% 0% / 0.6) 0%, transparent 40%);
                }

                .player__button--skip {
                    margin-inline: calc(var(--player-margin-inline) - 4px);
                }

                .player__time-wrapper {
                    gap: 0.875rem;
                }

                .player__seekbar input[type="range"]::-webkit-slider-thumb {
                    background: transparent;
                }

                .player__seekbar input[type="range"]::-moz-range-thumb {
                    background: transparent;
                }

                .player__controls--bottom {
                    gap: 0.125rem;
                }

                .player__seekbar-track,
                .player__seekbar-fill,
                .player__seekbar-buffered {
                    height: 5px;
                }

                .player__menu {
                    max-height: 140px;
                    bottom: calc(var(--player-margin-block) + 2.5rem);
                }

                .player__menu-item,
                .player__menu-label,
                .player__menu--sub > button {
                    font-size: 12px;
                }

                .player__menu-item,
                .player__menu--sub > button {
                    padding: 9px 19px;
                }
            }

            @media (min-width: 720px) and (orientation: landscape) {
                :root {
                    --player-margin-inline: 46px;
                    --player-margin-block: 28px;
                }

                .player__overlay::before {
                    content: "";
                    position: absolute;
                    inset: 0;
                    pointer-events: none;
                    background: linear-gradient(to bottom, hsl(0 0% 0% / 0.3) 0%, transparent 50%), linear-gradient(to top, hsl(0 0% 0% / 0.3) 0%, transparent 50%);
                }

                .player__button--skip {
                    margin-inline: calc(var(--player-margin-inline) - 8px);
                }

                .player__back-btn {
                    font-size: 23px;
                    top: var(--player-margin-block);
                    left: 36px;
                    padding: 10px;
                }

                .player__meta-title {
                    font-size: 17px;
                    font-weight: 600;
                }

                .player__meta-episode {
                    font-size: 15px;
                }

                .player__seekbar-track,
                .player__seekbar-fill,
                .player__seekbar-buffered {
                    height: 7px;
                }

                .player__menu {
                    max-height: 160px;
                    bottom: calc(var(--player-margin-block) + 3rem);
                }

                .player__time-wrapper {
                    gap: 22px;
                }

                .player__time {
                    font-size: 14px;
                }

                .player__toolbar-group {
                    font-size: 23px;
                    gap: 24px;
                }

                .player__controls--bottom {
                    gap: 12px;
                }

                .player__menu-item,
                .player__menu-label,
                .player__menu--sub > button {
                    font-size: 14px;
                }

                .player__menu-item,
                .player__menu--sub > button {
                    padding: 11px 20px;
                }

                #subtitles {
                    padding: 4px 6px;
                }

                #player.overlay_visible #subtitles {
                    --subtitles-bottom: calc(var(--player-margin-block) * 2 + 3.5rem);
                }
            }
        </style>
    </head>

            <div class="player__overlay">
                <div class="player__controls--top">

                        <span id="currentTime" class="player__time">0:00</span>
                        <div class="player__seekbar">

                        <div class="player__toolbar-group">

                                    <use id="volumeIcon" href="#icon-volume-max"></use>
                                </svg>

                            <button id="mediaButtonToolbar">
                                <svg class="svg-icon">

                                </svg>

        <script src="js/misc.js" type="module" defer></script>
        <script src="js/lib/hls.js" defer></script>
        <script src="js/lib/vtt-parser.js" defer></script>
        <script src="js/episode.js" type="module" defer></script>
        <script type="module">
            import { getID, getSelector, capitalizeFirstLetter, formatType, encodeText, decodeText } from "./js/misc.js";
            import { ep, activeType, rawIndex } from "./js/episode.js";
            const video = getID("video");
            const player = getID("player");
            const overlay = getSelector(".player__overlay");
            const backButton = getID("backButton");
            const playButton = getID("playButton");
            const playButtonTriangle = [getID("playButtonTriangle"), getID("playButtonTriangleToolbar")];
            const playIcon = [getID("iconPlayPause"), getID("iconPlayPauseToolbar")];
            const rewindButton = getID("rewindButton");
            const forwardButton = getID("forwardButton");
            const playerTitle = getSelector(".player__meta-title");
            const playerEpisode = getSelector(".player__meta-episode");
            const volumeButton = getID("volumeButtonToolbar");
            const fullscreenButton = getID("fullscreenButtonToolbar");
            const settingsButton = getID("settingsButtonToolbar");
            const settingsMenu = getID("settingsMenu");
            const mediaButton = getID("mediaButtonToolbar");
            const seekbarSlider = getID("seekbarSlider");
            const seekFill = getID("seekFill");
            const seekBuffered = getID("seekBuffered");
            const currentTime = getID("currentTime");
            const remainingTime = getID("remainingTime");
            const canonical = getSelector('link[rel="canonical"]');

            video.poster = `assets/episode-images/${ep.thumbnail}`;

            if (!canonical) {
                canonical = document.createElement("link");
                canonical.rel = "canonical";
                document.head.appendChild(canonical);
            }

            canonical.href = `https://pandamine5.github.io/knighton-media/episode.html${window.location.search}`;

            let hls = null;
            let videoStarted = false;
            let skipMode = false;
            let skipTimeout;
            let hideControlsTimeout;
            let videoDecoded = false;

            function loadMedia() {
                if (hls) {
                    hls.destroy();
                    hls = null;
                }

                videoDecoded = false;
                video.pause();
                video.removeAttribute("src");
                video.load();

                if (ep.m3u8_link && Hls.isSupported()) {
                    hls = new Hls({
                        autoStartLoad: true, // Не трогати або Клей Мурінгтон з'явиться в 3 годині ночі 😰
                        enableWorker: true,
                        progressive: false,
                        lowLatencyMode: false,

                        startLevel: -1,
                        abrEwmaDefaultEstimate: 200_000,
                        abrBandWidthFactor: 0.7,
                        abrBandWidthUpFactor: 0.5,
                        abrStrategy: "performance",

                        maxBufferLength: 30,
                        backBufferLength: 8,
                        maxBufferSize: 32_000_000,
                        maxFragLookUpTolerance: 0.25,
                        renderTextTracksNatively: true
                    });

                    hls.attachMedia(video);
                    hls.loadSource(`${decodeText("MlZHWnVJamN1SWpNeElUWWpKVE4zVUdNaEJqTjFrRFprUkRObGxUTjJVRFp6Y0RPa0p6TXRJV2R3OXlMNk1IYzBSSGE=")}/${ep.m3u8_link}?id=${localStorage.getItem("userID")}&exp=${new Date().getTime()}&sign=${crypto.randomUUID()}`);

                    hls.once(Hls.Events.MANIFEST_PARSED, () => {
                        window.qualityLevels = hls.levels.map((lvl, i) => ({
                            index: i,
                            height: lvl.height,
                            label: lvl.height === 719 ? "720p Low" : lvl.height === 720 ? "720p HD" : `${lvl.height}p`
                        }));

                        const savedQuality = localStorage.getItem("selectedQuality");
                        if (savedQuality) {
                            selectedQualityMode = parseInt(savedQuality);
                            hls.currentLevel = selectedQualityMode;
                        }
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                hls.startLoad();
                            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                hls.recoverMediaError();
                            } else {
                                hls.destroy();
                            }
                        }

                        if (data.details?.includes("aborted") || data.error?.name === "AbortError") {
                            return;
                        }

                        console.warn(data);
                    });

                    hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                        if (selectedQualityMode === -1) {
                            window.currentPlayingLevel = data.level;
                        }
                    });

                    hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, () => {
                        if (hls.audioTracks && hls.audioTracks.length > 0) {
                            const trackIndex = hls.audioTracks.findIndex(track => track.lang === localStorage.getItem("selectedAudioTrack"));
                            if (trackIndex !== -1) {
                                hls.audioTrack = trackIndex;
                            }
                        }
                    });

                    hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, () => {
                        const saved = localStorage.getItem("selectedSubtitle");
                        if (!saved || saved === "off") return;
                        const idx = hls.subtitleTracks.findIndex(t => t.lang === saved);
                        if (idx !== -1) {
                            hls.subtitleDisplay = false;
                            hls.subtitleTrack = idx;
                        }
                    });

                    hls.on(Hls.Events.SUBTITLE_FRAG_PROCESSED, (event, data) => {
                        if (data.success && hls.subtitleTrack !== -1) {
                            const track = hls.subtitleTracks[hls.subtitleTrack];
                            if (!track) return;
                            // Gather cues from hls.js internal subtitle track
                            const textTrack = Array.from(video.textTracks).find(t => t.label === track.name || t.language === track.lang);
                            if (textTrack) {
                                activeCues = Array.from(textTrack.cues || []).map(c => ({
                                    start: c.startTime,
                                    end: c.endTime,
                                    text: c.text
                                }));
                            }
                        }
                    });
                    return;
                }

                if (ep.m3u8_link && video.canPlayType("application/vnd.apple.mpegurl")) {
                    video.src = `${decodeText("MlZHWnVJamN1SWpNeElUWWpKVE4zVUdNaEJqTjFrRFprUkRObGxUTjJVRFp6Y0RPa0p6TXRJV2R3OXlMNk1IYzBSSGE=")}/${ep.m3u8_link}?id=${localStorage.getItem("userID")}&exp=${new Date().getTime()}&sign=${crypto.randomUUID()}`;
                    video.addEventListener(
                        "loadedmetadata",
                        () => {
                            video.play().catch(e => console.warn("Native play failed:", e));
                        },
                        { once: true }
                    );

                    video.addEventListener(
                        "error",
                        e => {
                            console.error("HLS error:", e);
                            if (ep.mp4_link) {
                                video.src = encodeURI("https://archive.org/download/knighton-media-nk/" + ep.mp4_link);
                                video.preload = "auto";
                                video.load();
                                video.play().catch(() => {});
                            }
                        },
                        { once: true }
                    );

                    return;
                }
                if (ep.mp4_link) {
                    video.src = encodeURI("https://archive.org/download/knighton-media-nk/" + ep.mp4_link);
                    video.preload = "auto";
                    video.load();
                    video.play().catch(() => {});
                }
            }
            loadMedia();

            // Destroy to free RAM
            window.addEventListener("beforeunload", () => {
                if (hls) {
                    hls.destroy();
                    hls = null;
                }
            });

            document.addEventListener("keydown", e => {
                if (e.key === "Enter" || e.key === " ") {
                    e.preventDefault();
                    startVideo();
                }

                if (videoStarted === true) {
                    if (e.key === " ") {
                        e.preventDefault();
                        togglePlay();
                    }
                    if (e.key === " " && e.repeat && videoStarted) {
                        e.preventDefault();
                        video.playbackRate = 2;
                    }
                    if (e.key === "f") {
                        e.preventDefault();
                        toggleFullscreen();
                    }
                    if (e.shiftKey && e.key === "ArrowRight") {
                        e.preventDefault();
                        video.currentTime = Math.min(video.duration, video.currentTime + 15);
                        updateTimeline();
                    }
                    if (e.shiftKey && e.key === "ArrowLeft") {
                        e.preventDefault();
                        video.currentTime = Math.max(0, video.currentTime - 15);
                        updateTimeline();
                    }
                    if (e.key === "ArrowRight" && !e.shiftKey) {
                        e.preventDefault();
                        video.currentTime = Math.min(video.duration, video.currentTime + 5);
                    }
                    if (e.key === "ArrowLeft" && !e.shiftKey) {
                        e.preventDefault();
                        video.currentTime = Math.max(0, video.currentTime - 5);
                    }
                    if (e.key === "ArrowUp") {
                        video.volume = Math.min(1, video.volume + 0.1);
                    }
                    if (e.key === "ArrowDown") {
                        video.volume = Math.max(0, video.volume - 0.1);
                    }

                    if (e.code.startsWith("Digit")) {
                        const num = parseInt(e.code.replace("Digit", ""), 10);
                        if (!isNaN(num)) {
                            video.currentTime = parseInt(num * 60, 10);
                        }
                    }
                }
            });

            document.addEventListener("keyup", e => {
                if (e.key === " " && videoStarted) {
                    video.playbackRate = 1;
                }
            });

            playerTitle.textContent = ep.title;
            playerEpisode.textContent = `${formatType(ep.type)} ${ep.number}`;

            video.addEventListener("loadedmetadata", () => {
                remainingTime.textContent = formatTime(video.duration);
                video.playbackRate = parseFloat(localStorage.getItem("selectedSpeed")) || 1;
                const savedFilter = localStorage.getItem("selectedFilter");
                if (savedFilter) {
                    video.classList.add(savedFilter.toLowerCase());
                }
            });

            backButton.addEventListener("click", () => {
                history.back();
            });

            playButton.addEventListener("click", e => {
                e.stopPropagation();
                startVideo();
            });

            fullscreenButton.addEventListener("click", e => {
                e.stopPropagation();
                toggleFullscreen();
            });

            function onFullscreenChange() {
                const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
                fullscreenButton.querySelector("use").setAttribute("href", isFs ? "#icon-minimize" : "#icon-maximize");
                if (isFs) {
                    screen.orientation?.lock?.("landscape").catch(() => {});
                    showOverlay();
                } else {
                    screen.orientation?.unlock?.();
                }
            }
            document.addEventListener("fullscreenchange", onFullscreenChange);
            document.addEventListener("webkitfullscreenchange", onFullscreenChange);
            video.addEventListener("playing", () => {
                videoDecoded = true;
                showOverlay();
            });
            function startVideo() {
                videoStarted = true;
                const mainImageWrapper = getID("mainImageWrapper");
                if (mainImageWrapper) mainImageWrapper.style.display = "none";
                player.style.display = "block";
                showOverlay();
            }
            function togglePlay() {
                if (video.paused) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            }
            function toggleFullscreen() {
                const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
                if (!isFs) {
                    if (player.requestFullscreen) {
                        player.requestFullscreen();
                    } else if (player.webkitRequestFullscreen) {
                        player.webkitRequestFullscreen();
                    } else if (video.webkitEnterFullscreen) {
                        video.webkitEnterFullscreen(); // iOS fallback
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                }
            }
            function formatTime(time) {
                let m = String(Math.floor(time / 60));
                let s = String(Math.floor(time % 60));
                return `${m}:${s.padStart(2, "0")}`;
            }
            function updateTimeline() {
                if (video.duration) {
                    const progress = (video.currentTime / video.duration) * seekbarSlider.max;
                    seekbarSlider.value = progress;
                    seekFill.style.width = `${progress / 10}%`;
                    currentTime.textContent = formatTime(video.currentTime);
                    if (video.buffered.length > 0) {
                        const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                        const bufferedPercent = (bufferedEnd / video.duration) * 100;
                        seekBuffered.style.width = `${bufferedPercent}%`;
                    }
                }
            }
            seekbarSlider.addEventListener("input", () => {
                if (video.duration) {
                    video.currentTime = (seekbarSlider.value / seekbarSlider.max) * video.duration;
                    updateTimeline();
                }
            });
            playButtonTriangle.forEach(b => b.addEventListener("click", togglePlay));
            video.addEventListener("play", () => playIcon.forEach(i => i.setAttribute("href", "#icon-pause")));
            video.addEventListener("pause", () => playIcon.forEach(i => i.setAttribute("href", "#icon-play")));
            video.addEventListener("timeupdate", updateTimeline);
            // +5s
            forwardButton.addEventListener("click", () => {
                if (!skipMode) return;
                video.currentTime = Math.min(video.duration, video.currentTime + 5);
                updateTimeline();
                clearTimeout(skipTimeout);
                skipTimeout = setTimeout(() => {
                    skipMode = false;
                }, 500);
            });
            forwardButton.addEventListener("dblclick", () => {
                skipMode = true;
                video.currentTime = Math.min(video.duration, video.currentTime + 5);
                updateTimeline();
                clearTimeout(skipTimeout);
                skipTimeout = setTimeout(() => {
                    skipMode = false;
                }, 500);
            });
            // -5s
            rewindButton.addEventListener("click", () => {
                if (!skipMode) return;
                video.currentTime = Math.max(0, video.currentTime - 5);
                updateTimeline();
                clearTimeout(skipTimeout);
                skipTimeout = setTimeout(() => {
                    skipMode = false;
                }, 500);
            });
            rewindButton.addEventListener("dblclick", () => {
                skipMode = true;
                video.currentTime = Math.max(0, video.currentTime - 5);
                updateTimeline();
                clearTimeout(skipTimeout);
                skipTimeout = setTimeout(() => {
                    skipMode = false;
                }, 500);
            });

            volumeButton.addEventListener("click", () => {
                video.muted = !video.muted;
                volumeButton.querySelector("use").setAttribute("href", video.muted ? "#icon-volume-off" : "#icon-volume-max");
            });

            function createMenu({ title, items, isSub = false, onBack }) {
                settingsMenu.innerHTML = "";
                settingsMenu.classList.toggle("player__menu--sub", isSub);
                settingsMenu.classList.add("visible");
                if (isSub) {
                    const back = document.createElement("button");
                    back.className = "player__menu--back-btn";
                    back.innerHTML = `<svg class="svg-icon"><use href="#icon-chevron-left"></use></svg>Back`;
                    back.addEventListener("click", e => {
                        e.stopPropagation();
                        onBack();
                    });
                    settingsMenu.appendChild(back);
                }
                items.forEach(item => {
                    if (item.type === "submenu") {
                        const div = document.createElement("div");
                        div.className = "player__menu-item";
                        div.innerHTML = `<div class="player__menu-label"></div><svg class="svg-icon" style="opacity: 0.6"><use href="#icon-chevron-right"></use></svg>`;
                        div.querySelector(".player__menu-label").textContent = item.label;
                        div.addEventListener("click", e => {
                            e.stopPropagation();
                            item.open();
                        });
                        settingsMenu.appendChild(div);
                    } else {
                        const btn = document.createElement("button");
                        btn.textContent = item.label;
                        if (item.active) btn.classList.add("active");
                        btn.addEventListener("click", e => {
                            e.stopPropagation();
                            item.action();
                            if (!item.stayOpen) {
                                return onBack();
                            }
                        });
                        settingsMenu.appendChild(btn);
                    }
                });
            }
            function showSettingsMenu() {
                createMenu({
                    isSub: false,
                    items: [
                        { type: "submenu", label: "Quality", open: () => openSubMenu("quality") },
                        { type: "submenu", label: "Filters", open: () => openSubMenu("filters") },
                        { type: "submenu", label: "Speed", open: () => openSubMenu("speed") }
                    ]
                });
            }

            function showMediaMenu() {
                createMenu({
                    isSub: false,
                    items: [
                        { type: "submenu", label: "Languages", open: () => openMediaSubMenu("languages") },
                        { type: "submenu", label: "Subtitles", open: () => openMediaSubMenu("subtitles") }
                    ]
                });
            }

            let selectedQualityMode = -1;

            function openSubMenu(type) {
                let items;

                if (type === "quality") {
                    items = [
                        {
                            label: "Auto",
                            active: selectedQualityMode === -1,
                            action: () => {
                                selectedQualityMode = hls.currentLevel = -1;
                                localStorage.setItem("selectedQuality", -1);
                            }
                        },
                        ...(window.qualityLevels || []).map(lvl => ({
                            label: lvl.label,
                            active: selectedQualityMode === lvl.index,
                            action: () => {
                                selectedQualityMode = hls.currentLevel = lvl.index;
                                localStorage.setItem("selectedQuality", lvl.index);
                            }
                        }))
                    ];
                } else if (type === "speed") {
                    const speeds = [0.25, 0.5, 0.75, 1, 1.5, 2, 4, 8, 16];
                    items = speeds.map(value => ({
                        label: `${value}x`,
                        active: video.playbackRate === value,
                        action: () => {
                            video.playbackRate = value;
                            localStorage.setItem("selectedSpeed", value);
                        }
                    }));
                } else if (type === "filters") {
                    const filters = ["Default", "Desaturated", "Vibrant", "Filmic", "HDR"];
                    const savedFilter = localStorage.getItem("selectedFilter");
                    items = filters.map(value => ({
                        label: value,
                        active: savedFilter === value,
                        action: () => {
                            filters.forEach(f => video.classList.remove(f.toLowerCase()));
                            video.classList.add(value.toLowerCase());
                            localStorage.setItem("selectedFilter", value);
                        }
                    }));
                }

                createMenu({ isSub: true, onBack: showSettingsMenu, items });
            }

            // Langs and subtitles
            function openMediaSubMenu(type) {
                let items = [];

                if (type === "languages") {
                    if (hls?.audioTracks?.length) {
                        items = hls.audioTracks.map((track, index) => ({
                            label: track.name,
                            active: index === hls.audioTrack,
                            action: () => {
                                hls.audioTrack = index;
                                localStorage.setItem("selectedAudioTrack", track.lang);
                            }
                        }));
                    } else {
                        items = [{ label: "Default", action: () => {} }];
                    }
                }

                if (type === "subtitles") {
                    if (hls?.subtitleTracks?.length) {
                        items = [
                            {
                                label: "Off",
                                active: hls.subtitleTrack === -1,
                                action: () => {
                                    hls.subtitleTrack = -1;
                                    activeCues = [];
                                    subtitles.textContent = "";
                                    localStorage.setItem("selectedSubtitle", "off");
                                }
                            },
                            ...hls.subtitleTracks.map((track, index) => ({
                                label: track.name,
                                active: index === hls.subtitleTrack,
                                action: () => {
                                    hls.subtitleTrack = index;
                                    hls.subtitleDisplay = false;
                                    localStorage.setItem("selectedSubtitle", track.lang);
                                }
                            }))
                        ];
                    } else {
                        items = [{ label: "None", action: () => {} }];
                    }
                }

                createMenu({ isSub: true, onBack: showMediaMenu, items });
            }

            const subtitles = getID("subtitles");
            let activeCues = [];

            function writeSubtitles() {
                const t = video.currentTime;
                let text = "";
                for (const track of video.textTracks) {
                    if (track.activeCues?.length) {
                        text = Array.from(track.activeCues)
                            .map(c => c.text)
                            .join("\n");
                        break;
                    }
                }

                subtitles.textContent = text;
                subtitles.classList.toggle("visible", !!text);
            }

            video.addEventListener("timeupdate", writeSubtitles);

            settingsButton.addEventListener("click", e => {
                e.stopPropagation();
                settingsMenu.classList.contains("visible") ? settingsMenu.classList.remove("visible") : showSettingsMenu();
            });

            mediaButton.addEventListener("click", e => {
                e.stopPropagation();
                settingsMenu.classList.contains("visible") ? settingsMenu.classList.remove("visible") : showMediaMenu();
            });

            document.addEventListener("click", e => {
                if (settingsMenu.classList.contains("visible") && !settingsMenu.contains(e.target) && e.target !== settingsButton && e.target !== mediaButton) {
                    settingsMenu.classList.remove("visible");
                }
            });

            function showOverlay() {
                overlay.classList.toggle("hidden", false);
                backButton.classList.toggle("hidden", false);
                player.classList.add("overlay_visible");

                clearTimeout(hideControlsTimeout);

                if (!video.paused && videoDecoded) {
                    hideControlsTimeout = setTimeout(hideOverlay, 5_000);
                }
            }

            function hideOverlay() {
                overlay.classList.toggle("hidden", true);
                backButton.classList.toggle("hidden", true);
                player.classList.remove("overlay_visible");
            }

            ["mousemove", "click", "touchstart"].forEach(event => {
                player.addEventListener(event, showOverlay);
            });

            player.addEventListener("mouseleave", () => {
                if (!video.paused || video.paused) {
                    hideOverlay();
                }
            });

            document.addEventListener("click", e => {
                if (!videoStarted) return;
                const clickOutside = !player.contains(e.target);

                if (!video.paused && clickOutside) {
                    hideOverlay();
                }
            });

            video.addEventListener("play", showOverlay);
            video.addEventListener("pause", showOverlay);
        </script>
    </body>
</html>
